services:
  postgres:
    image: postgres:18-alpine
    container_name: modflix-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DBNAME:-modflix}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PG_USER:-postgres} -d ${PG_DBNAME:-modflix}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
